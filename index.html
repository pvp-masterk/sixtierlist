<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Builder</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@400;700&family=Pacifico&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #18181b;
            --bg-panel: #27272a;
            --bg-input: #3f3f46;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border-color: #3f3f46;
            --canvas-bg: #1e1e24;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', sans-serif; 
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
        }

        /* Top Navbar */
        .topbar {
            height: 50px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }

        .brand {
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .topbar-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Layout Structure */
        .workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 50px);
        }

        /* Sidebars */
        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-left {
            width: 260px;
            border-right: 1px solid var(--border-color);
        }

        .sidebar-right {
            width: 300px;
            border-left: 1px solid var(--border-color);
            border-right: none;
            display: none; /* Hidden until selection */
        }

        .sidebar-right.active {
            display: flex;
        }

        .empty-state {
            width: 300px;
            border-left: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            padding: 20px;
            background: var(--bg-panel);
        }

        /* Typography & Grouping */
        h2 { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--text-muted); 
            margin-bottom: 10px;
        }

        .panel-section {
            background: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            margin-bottom: 12px; 
        }
        
        .control-group:last-child { margin-bottom: 0; }

        label { 
            font-size: 0.8rem; 
            color: var(--text-main); 
        }

        /* Inputs & Buttons */
        input[type="text"], select, input[type="number"] {
            width: 100%; 
            padding: 8px 10px; 
            background: var(--bg-input); 
            border: 1px solid var(--border-color);
            color: white; 
            border-radius: 6px; 
            outline: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent);
        }
        
        input[type="range"] { 
            width: 100%; 
            accent-color: var(--accent); 
        }
        
        .color-row { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }

        input[type="color"] {
            width: 35px; 
            height: 35px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px;
            background: var(--bg-input); 
            cursor: pointer;
            padding: 2px;
        }

        button {
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 10px; 
            border-radius: 6px;
            cursor: pointer; 
            font-weight: 500; 
            font-size: 0.9rem;
            transition: 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { background: var(--accent-hover); }
        
        button.secondary {
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }
        button.secondary:hover { background: #52525b; }

        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }

        .btn-grid { 
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        /* Canvas Area */
        #canvas-wrapper {
            flex-grow: 1; 
            position: relative;
            background-color: var(--canvas-bg);
            /* Design Grid Pattern */
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: auto;
        }

        #canvas {
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0;
        }

        /* Generated UI Elements */
        .ui-element {
            position: absolute;
            min-width: 50px; 
            min-height: 30px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: grab;
            user-select: none;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .ui-element:active { cursor: grabbing; }
        
        .ui-element.selected {
            outline: 2px solid var(--accent) !important;
            outline-offset: 2px;
        }

        .text-content {
            pointer-events: none; /* Let the parent handle dragging */
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Resize Handle */
        .resize-handle {
            position: absolute; 
            right: -4px; 
            bottom: -4px; 
            width: 12px; 
            height: 12px;
            background: var(--text-main);
            border: 2px solid var(--accent);
            border-radius: 50%;
            cursor: se-resize; 
            opacity: 0; 
            transition: opacity 0.2s;
            z-index: 10;
        }

        .ui-element.selected .resize-handle { opacity: 1; }

        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #71717a; }
    </style>
</head>
<body>

    <!-- TOP NAVBAR -->
    <div class="topbar">
        <div class="brand">UI Builder</div>
        <div class="topbar-controls">
            <label style="margin: 0; color: var(--text-muted);">Canvas Background</label>
            <input type="color" id="canvas-bg-color" value="#1e1e24" onchange="updateCanvasBg(this.value)">
            <button class="secondary" style="width: auto; padding: 6px 12px;" onclick="clearCanvas()">Clear Canvas</button>
        </div>
    </div>

    <!-- MAIN WORKSPACE -->
    <div class="workspace">
        
        <!-- LEFT SIDEBAR: TOOLS -->
        <aside class="sidebar sidebar-left">
            <div class="panel-section">
                <h2>Insert Elements</h2>
                <div class="btn-grid">
                    <button class="secondary" onclick="addElement('div')">Add Container</button>
                    <button class="secondary" onclick="addElement('button')">Add Button</button>
                    <button class="secondary" onclick="addElement('text')">Add Text</button>
                </div>
            </div>
        </aside>

        <!-- CENTER: CANVAS -->
        <main id="canvas-wrapper" onclick="deselectElement(event)">
            <div id="canvas">
                <!-- Elements injected here -->
            </div>
        </main>

        <!-- RIGHT SIDEBAR: EMPTY STATE -->
        <div class="empty-state" id="empty-state">
            <p>Select an element to edit its properties.</p>
        </div>

        <!-- RIGHT SIDEBAR: PROPERTIES -->
        <aside class="sidebar sidebar-right" id="properties-panel">
            
            <div class="panel-section">
                <h2>Content</h2>
                <div class="control-group">
                    <label>Text / Label</label>
                    <input type="text" id="prop-text" oninput="updateText(this.value)">
                </div>
            </div>

            <div class="panel-section">
                <h2>Appearance</h2>
                <div class="control-group">
                    <label>Background</label>
                    <div class="color-row">
                        <input type="color" id="prop-bg1" value="#3b82f6" onchange="updateBackground()">
                        <input type="color" id="prop-bg2" value="#8b5cf6" onchange="updateBackground()">
                        <select id="prop-bg-type" onchange="updateBackground()">
                            <option value="solid">Solid (Left)</option>
                            <option value="gradient">Gradient</option>
                            <option value="transparent">Transparent</option>
                        </select>
                    </div>
                </div>

                <div class="control-group" style="margin-top: 10px;">
                    <label>Corner Radius (<span id="radius-val">0</span>px)</label>
                    <input type="range" id="prop-radius" min="0" max="100" value="0" oninput="updateStyle('borderRadius', this.value + 'px'); document.getElementById('radius-val').innerText = this.value;">
                </div>
            </div>

            <div class="panel-section">
                <h2>Border</h2>
                <div class="control-group">
                    <div class="color-row">
                        <input type="color" id="prop-border-color" value="#ffffff" onchange="updateBorder()">
                        <input type="range" id="prop-border-width" min="0" max="20" value="0" oninput="updateBorder()">
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h2>Typography</h2>
                <div class="control-group">
                    <label>Font Family</label>
                    <select id="prop-font" onchange="updateStyle('fontFamily', this.value)">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Montserrat', sans-serif">Montserrat</option>
                        <option value="'Pacifico', cursive">Pacifico</option>
                        <option value="'Press Start 2P', cursive">Retro Pixel</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>Text Color</label>
                    <input type="color" id="prop-color" value="#ffffff" onchange="updateStyle('color', this.value)">
                </div>

                <div class="control-group">
                    <label>Font Size (<span id="font-val">16</span>px)</label>
                    <input type="range" id="prop-font-size" min="10" max="120" value="16" oninput="updateStyle('fontSize', this.value + 'px'); document.getElementById('font-val').innerText = this.value;">
                </div>

                <div class="control-group">
                    <label>Text Effects</label>
                    <select id="prop-text-effect" onchange="applyTextEffect(this.value)">
                        <option value="none">None</option>
                        <option value="shadow">Drop Shadow</option>
                        <option value="neon">Neon Glow</option>
                    </select>
                </div>
            </div>

            <button class="danger" onclick="deleteSelected()">Delete Element</button>
        </aside>

    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const propertiesPanel = document.getElementById('properties-panel');
        const emptyState = document.getElementById('empty-state');
        let selectedEl = null;

        // --- GLOBAL CANVAS ACTIONS ---
        function updateCanvasBg(color) {
            canvasWrapper.style.backgroundColor = color;
        }

        function clearCanvas() {
            if(confirm("Are you sure you want to clear the canvas?")) {
                canvas.innerHTML = '';
                deselectElement({ target: canvasWrapper });
            }
        }

        // --- ADD ELEMENTS ---
        function addElement(type) {
            const el = document.createElement(type === 'text' ? 'div' : type);
            el.className = 'ui-element';
            
            // Text Container inside Element
            const textSpan = document.createElement('span');
            textSpan.className = 'text-content';
            
            // Default Styles
            el.style.top = '100px';
            el.style.left = '100px';
            el.style.color = '#ffffff';
            el.style.fontFamily = "'Inter', sans-serif";
            el.style.fontSize = '16px';
            
            if (type === 'div') {
                el.style.width = '150px';
                el.style.height = '150px';
                el.style.background = '#3b82f6';
                textSpan.innerText = 'Container';
            } else if (type === 'button') {
                el.style.width = '120px';
                el.style.height = '45px';
                el.style.background = '#8b5cf6';
                el.style.border = 'none';
                el.style.borderRadius = '6px';
                textSpan.innerText = 'Click Me';
            } else if (type === 'text') {
                el.style.width = 'auto';
                el.style.height = 'auto';
                el.style.fontSize = '32px';
                el.style.fontWeight = 'bold';
                textSpan.innerText = 'Double Click to Edit';
            }

            // Resize Handle
            const handle = document.createElement('div');
            handle.className = 'resize-handle';
            
            // Append structures
            el.appendChild(textSpan);
            el.appendChild(handle);
            canvas.appendChild(el);

            // Event Listeners
            el.addEventListener('mousedown', initDrag);
            handle.addEventListener('mousedown', initResize);
            el.addEventListener('click', selectElement);

            // Auto select new element
            selectElement({ target: el, stopPropagation: () => {} });
        }

        // --- SELECTION LOGIC ---
        function selectElement(e) {
            e.stopPropagation();
            if (e.target.classList.contains('resize-handle')) return;
            
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = e.target.closest('.ui-element');
            selectedEl.classList.add('selected');
            
            // Toggle sidebars
            emptyState.style.display = 'none';
            propertiesPanel.classList.add('active');
            
            loadProperties();
        }

        function deselectElement(e) {
            if (e.target === canvasWrapper || e.target === canvas) {
                if (selectedEl) selectedEl.classList.remove('selected');
                selectedEl = null;
                
                // Toggle sidebars
                propertiesPanel.classList.remove('active');
                emptyState.style.display = 'flex';
            }
        }

        function deleteSelected() {
            if (selectedEl) {
                selectedEl.remove();
                deselectElement({ target: canvasWrapper });
            }
        }

        // --- PROPERTY BINDING ---
        function loadProperties() {
            if (!selectedEl) return;
            
            const textSpan = selectedEl.querySelector('.text-content');
            document.getElementById('prop-text').value = textSpan ? textSpan.innerText : '';
            
            const styles = window.getComputedStyle(selectedEl);
            
            const radius = parseInt(styles.borderRadius) || 0;
            document.getElementById('prop-radius').value = radius;
            document.getElementById('radius-val').innerText = radius;
            
            document.getElementById('prop-border-width').value = parseInt(styles.borderWidth) || 0;
            
            const fontSize = parseInt(styles.fontSize) || 16;
            document.getElementById('prop-font-size').value = fontSize;
            document.getElementById('font-val').innerText = fontSize;
        }

        function updateText(value) {
            if (!selectedEl) return;
            const textSpan = selectedEl.querySelector('.text-content');
            if(textSpan) textSpan.innerText = value;
        }

        function updateStyle(prop, value) {
            if (!selectedEl) return;
            selectedEl.style[prop] = value;
        }

        function updateBackground() {
            if (!selectedEl) return;
            const c1 = document.getElementById('prop-bg1').value;
            const c2 = document.getElementById('prop-bg2').value;
            const type = document.getElementById('prop-bg-type').value;

            if (type === 'solid') {
                selectedEl.style.background = c1;
            } else if (type === 'gradient') {
                selectedEl.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
            } else {
                selectedEl.style.background = 'transparent';
            }
        }

        function updateBorder() {
            if (!selectedEl) return;
            const color = document.getElementById('prop-border-color').value;
            const width = document.getElementById('prop-border-width').value;
            if(width > 0) {
                selectedEl.style.border = `${width}px solid ${color}`;
            } else {
                selectedEl.style.border = 'none';
            }
        }

        function applyTextEffect(type) {
            if (!selectedEl) return;
            const color = window.getComputedStyle(selectedEl).color;
            if (type === 'none') selectedEl.style.textShadow = 'none';
            if (type === 'shadow') selectedEl.style.textShadow = `3px 3px 6px rgba(0,0,0,0.6)`;
            if (type === 'neon') selectedEl.style.textShadow = `0 0 5px ${color}, 0 0 15px ${color}, 0 0 30px ${color}`;
        }

        // --- DRAG LOGIC ---
        let isDragging = false;
        let startX, startY, startLeft, startTop;

        function initDrag(e) {
            if (e.target.classList.contains('resize-handle')) return;
            isDragging = true;
            selectedEl = e.target.closest('.ui-element');
            startX = e.clientX;
            startY = e.clientY;
            startLeft = parseInt(window.getComputedStyle(selectedEl).left) || 0;
            startTop = parseInt(window.getComputedStyle(selectedEl).top) || 0;
            
            document.addEventListener('mousemove', doDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function doDrag(e) {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            selectedEl.style.left = startLeft + dx + 'px';
            selectedEl.style.top = startTop + dy + 'px';
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', doDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // --- RESIZE LOGIC ---
        let isResizing = false;
        let startW, startH;

        function initResize(e) {
            e.stopPropagation();
            isResizing = true;
            selectedEl = e.target.closest('.ui-element');
            startX = e.clientX;
            startY = e.clientY;
            startW = parseInt(window.getComputedStyle(selectedEl).width) || 0;
            startH = parseInt(window.getComputedStyle(selectedEl).height) || 0;

            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
        }

        function doResize(e) {
            if (!isResizing) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            selectedEl.style.width = Math.max(20, startW + dx) + 'px'; // Minimum 20px
            selectedEl.style.height = Math.max(20, startH + dy) + 'px'; // Minimum 20px
        }

        function stopResize() {
            isResizing = false;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
        }
    </script>
</body>
</html>
