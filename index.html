<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixTierList | MC PvP Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0000;
            --panel-bg: #1a0505;
            --border-color: #330a0a;
            --red-glow: 0 0 15px rgba(255, 0, 0, 0.5);
            --red-accent: #ff1a1a;
            --red-dark: #990000;
            --text-main: #f2f2f2;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at 50% 0%, #330000 0%, transparent 50%);
            min-height: 100vh;
        }

        /* Header Styles */
        header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 20px var(--red-accent), 0 0 40px var(--red-dark);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .mode-btn {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .mode-btn:hover {
            border-color: var(--red-accent);
            box-shadow: var(--red-glow);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background-color: var(--red-dark);
            border-color: var(--red-accent);
            box-shadow: var(--red-glow);
        }

        /* Tier List Container */
        .tier-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .tier-row {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            min-height: 100px;
            background-color: #110202;
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            border-right: 2px solid var(--border-color);
            flex-shrink: 0;
        }

        .tier-players {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            flex-grow: 1;
        }

        /* Player Cards */
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
            cursor: pointer;
            width: 80px;
        }

        .player-card:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .player-card img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            border: 2px solid #333;
            transition: border-color 0.2s;
            background-color: #222; /* Placeholder while loading */
        }

        .player-card:hover img {
            border-color: var(--red-accent);
            box-shadow: 0 0 15px var(--red-accent);
        }

        .player-name {
            margin-top: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            text-align: center;
            word-break: break-all;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>SixTierList</h1>
        <p>The Ultimate Enhanced Minecraft PvP Hierarchy</p>
    </header>

    <div class="mode-selector" id="mode-selector">
        <!-- Buttons generated by JS -->
    </div>

    <div class="tier-container" id="tier-container">
        <!-- Tiers generated by JS -->
    </div>

    <script>
        // Tier Hierarchy & Colors
        const tiers = [
            { id: 'HT1', color: '#ff0000' }, // Pure Red
            { id: 'LT1', color: '#e60000' },
            { id: 'HT2', color: '#cc0000' },
            { id: 'LT2', color: '#b30000' },
            { id: 'HT3', color: '#990000' },
            { id: 'LT3', color: '#800000' },
            { id: 'HT4', color: '#660000' },
            { id: 'LT4', color: '#4d0000' },
            { id: 'HT5', color: '#330000' },
            { id: 'LT5', color: '#220000' }  // Darkest Red
        ];

        // Database of Players (Add real Minecraft Usernames here)
        const db = {
            "Mace PvP": {
                "HT1": ["ClownPierce", "minemanner"],
                "LT1": ["Odo"],
                "HT2": ["Technoblade"],
                "LT5": ["Grian"]
            },
            "Sword PvP": {
                "HT1": ["Stimpy", "Tryhard"],
                "LT1": ["Gamerboy80"],
                "HT3": ["Dream"]
            },
            "SMP": {
                "HT1": ["Rekrap2", "Branzy"],
                "LT1": ["ParrotX2"],
                "HT2": ["Spoke"]
            },
            "Crystal PvP": {
                "HT1": ["Itz_Iq", "Marloww"],
                "LT2": ["Ruler"],
                "LT4": ["Rasplin"]
            },
            "Elytra PvP": {
                "HT1": ["WadZee"],
                "LT1": ["Sandiction"]
            }
        };

        const modes = Object.keys(db);
        let currentMode = modes[0];

        // Initialize Page
        function init() {
            renderButtons();
            renderTiers();
        }

        // Render Mode Buttons
        function renderButtons() {
            const container = document.getElementById('mode-selector');
            container.innerHTML = '';
            
            modes.forEach(mode => {
                const btn = document.createElement('button');
                btn.className = `mode-btn ${mode === currentMode ? 'active' : ''}`;
                btn.innerText = mode;
                btn.onclick = () => {
                    currentMode = mode;
                    renderButtons();
                    renderTiers();
                };
                container.appendChild(btn);
            });
        }

        // Render the Tier List Board
        function renderTiers() {
            const container = document.getElementById('tier-container');
            container.innerHTML = '';

            const modeData = db[currentMode];

            tiers.forEach(tier => {
                const row = document.createElement('div');
                row.className = 'tier-row';

                // Label
                const label = document.createElement('div');
                label.className = 'tier-label';
                label.style.backgroundColor = tier.color;
                label.innerText = tier.id;
                
                // Adjust text color for contrast on darker reds
                if(['HT4', 'LT4', 'HT5', 'LT5'].includes(tier.id)) {
                    label.style.color = '#ff6666';
                } else {
                    label.style.color = '#ffffff';
                }

                // Players Container
                const playersDiv = document.createElement('div');
                playersDiv.className = 'tier-players';

                // Add Players
                const playersInTier = modeData[tier.id] || [];
                playersInTier.forEach(username => {
                    // Create Player Card (Links to NameMC)
                    const card = document.createElement('a');
                    card.className = 'player-card';
                    card.href = `https://namemc.com/profile/${username}`;
                    card.target = "_blank";
                    card.title = `View ${username} on NameMC`;

                    // Fetch 3D Head from Minotar API
                    const img = document.createElement('img');
                    img.src = `https://minotar.net/helm/${username}/64.png`;
                    img.alt = username;
                    img.loading = "lazy";

                    const nameLabel = document.createElement('div');
                    nameLabel.className = 'player-name';
                    nameLabel.innerText = username;

                    card.appendChild(img);
                    card.appendChild(nameLabel);
                    playersDiv.appendChild(card);
                });

                row.appendChild(label);
                row.appendChild(playersDiv);
                container.appendChild(row);
            });
        }

        // Run the initialization
        init();
    </script>
</body>
</html>
